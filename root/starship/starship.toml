
format = """
[╭──](fg:#ED2840) 󰇴 $username$directory $git_branch$git_status
[╰──](fg:#ED2840)$character"""

command_timeout = 5001
add_newline = true

[os]
format = "[$symbol](bold fg:blue)"
disabled = false

[os.symbols]
Windows = " "
Kali = " "

[username]
style_user = "fg:#ffffff bold bg:#E01D2E bold"
style_root = "#ffffff bold bg:#ED2840 bold"
format = "[](bold fg:#ED2840)[$user]($style)[ ](bold fg:#ED2840)"
disabled = false
show_always = true

[directory]
style = "bg:#1F1F1F fg:#ffffff"
format = ' [](bold fg:#1F1F1F)[󰉋 $path]($style)[](bold fg:#1F1F1F)'

[character]
success_symbol = "[](bold fg:#ED2840)"
error_symbol = "[](bold fg:red)"

[git_branch]
style = "bg: cyan"
symbol = "󰘬"
truncation_length = 13
truncation_symbol = ""
format = "[](bold fg:#9C0E0E)[$symbol $branch(:$remote_branch)](fg:#ffffff bg:#9C0E0E)[ ](bold fg:#9C0E0E)"
