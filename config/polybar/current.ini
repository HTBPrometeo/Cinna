;; =========================================================
;; POLYBAR SEGMENTED CYBER BAR
;; =========================================================

[global/wm]
margin-top = 30
margin-bottom = 0

;; =========================================================
;; MAIN BASE
;; =========================================================

[bar/main]
monitor =
monitor-fallback =
monitor-strict = false

bottom = false
fixed-center = true

width = 17%
height = 35

offset-x = 0
offset-y = 0

background = #00000000
foreground = #ffffff

radius-top = 0
radius-bottom = 0

line-size = 0
border-size = 0

padding-left = 0
padding-right = 0

module-margin-left = 0
module-margin-right = 0

font-0 = "Iosevka Nerd Font:size=12;3"
font-1 = "Iosevka Nerd Font:size=16;4"

separator =
spacing = 0

dim-value = 1.0

wm-name = polybar

tray-position = none

wm-restack = bspwm
override-redirect = false

enable-ipc = true

pseudo-transparency = false

;; =========================================================
;; BACKGROUND / CAVA BAR
;; =========================================================

[bar/secondary]
inherit = bar/main

width = 100%
height = 40

offset-x = 29%
offset-y = 0

background = #aa000000
foreground = #ffffff

padding-left = 0
padding-right = 0

modules-center = empty

;; =========================================================
;; ETHERNET BAR
;; =========================================================

[bar/ethernet_bar]
inherit = bar/main

width = 10%
height = 40

offset-x = 0%
offset-y = 0

background = #1A1B26
foreground = #ffffff

padding-left = 0
padding-right = 0

modules-center = ethernet_status

;; =========================================================
;; VPN BAR
;; =========================================================

[bar/vpn_bar]
inherit = bar/main

width = 10%
height = 40

offset-x = 10%
offset-y = 0

background = #252633
foreground = #ffffff

padding-left = 0
padding-right = 0

modules-center = vpn_status

;; =========================================================
;; TARGET BAR
;; =========================================================

[bar/target_bar]
inherit = bar/main

width = 10%
height = 40

offset-x = 19%
offset-y = 0

background = #2D2E3B
foreground = #ffffff

padding-left = 0
padding-right = 0

modules-center = target_status

;; =========================================================
;; CAVA MODULE
;; =========================================================

[module/empty]
type = custom/script

exec = ~/.config/bin/cava.sh


format = <label>
format-foreground = #ffffff

label = %output%
label-padding = 0

;; =========================================================
;; ETHERNET STATUS
;; =========================================================

[module/ethernet_status]
type = custom/script

exec = ~/.config/bin/ethernet_status.sh
interval = 2

format = <label>
format-foreground = #ffffff

label = %output%
label-padding = 0

;; =========================================================
;; VPN STATUS
;; =========================================================

[module/vpn_status]
type = custom/script

exec = ~/.config/bin/vpn_status.sh
interval = 2

format = <label>
format-foreground = #ffffff

label = %output%
label-padding = 0

;; =========================================================
;; TARGET STATUS
;; =========================================================

[module/target_status]
type = custom/script

exec = ~/.config/bin/target_to_hack.sh
interval = 2

format = <label>
format-foreground = #ffffff

label = %output%
label-padding = 0

;; =========================================================
;; SETTINGS
;; =========================================================

[settings]
throttle-output = 5
throttle-output-for = 10

throttle-input-for = 30

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
